# ============================
# Server Configuration
# ============================
server.port=8080

# ============================
# MySQL Database Configuration
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/swadeshi_travel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate Configuration
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================
# JWT Configuration
# ============================
jwt.secret=swadeshi_travel_secret_key_btech_miniproject_2024_very_long_key
jwt.expiration=86400000

# ============================
# App Configuration
# ============================
app.name=Swadeshi Travel

# ============================
# File Upload
# ============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
